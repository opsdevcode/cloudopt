# On push to main: compute next version from conventional commits, bump pyproject.toml, tag, and create GitHub release.
# Version bump: feat -> minor; fix/perf/docs/chore/etc. -> patch; BREAKING CHANGE or feat! -> major.
# Runs only when source or release config change.
#
# -----------------------------------------------------------------------------
# If release fails with GH013 / "Cannot update this protected ref" / "Changes must
# be made through a pull request" / "Waiting for Code Scanning results":
#
# 1. Create a Classic PAT (repo scope) or Fine-grained PAT (contents write on this
#    repo) for a bot or human account that is allowed to bypass branch/ruleset
#    restrictions.
# 2. Add repository secret RELEASE_PAT with that token (Settings → Secrets → Actions).
# 3. In Settings → Rules → Rulesets (or Branch protection for main), under the rule
#    that blocks pushes: add that same account (or a GitHub App) to **Bypass list**
#    so it can push version commits and tags to main. Include bypass for any
#    "Require code scanning" / status checks if those block automated pushes.
# 4. GITHUB_TOKEN alone cannot bypass these rules; semantic-release falls back to it
#    when RELEASE_PAT is unset.
#
# Re-run manually: Actions → Release → Run workflow (after fixing secrets/rules).
# -----------------------------------------------------------------------------
name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "alembic/**"
      - "**/*.py"
      - "pyproject.toml"
      - ".github/workflows/release.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Default deny; release job grants only what semantic-release needs.
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0 # full history required for semantic-release to find commits since last tag
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Reset to workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Semantic version and release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"
          build: "false"
          verbosity: "2"

    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
      version: ${{ steps.release.outputs.version || '' }}
      tag: ${{ steps.release.outputs.tag || '' }}
