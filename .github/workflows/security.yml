# Runs on every PR; jobs run only when path filter matches, else report success (skip) so status is not pending.
name: Security

on:
  pull_request:
    branches:
      - main
  schedule:
    # Weekly scan: Monday 08:00 UTC
    - cron: "0 8 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            security:
              - "apps/**"
              - "packages/**"
              - "alembic/**"
              - "**/*.py"
              - "pyproject.toml"
              - ".github/workflows/security.yml"

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: pip install pip-audit

      - name: Audit dependencies
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: pip-audit

      - name: Skip (no relevant paths changed)
        if: steps.filter.outputs.security != 'true' && github.event_name != 'schedule'
        run: echo "Skipped — no relevant paths changed"

  secrets-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            security:
              - "apps/**"
              - "packages/**"
              - "alembic/**"
              - "**/*.py"
              - "pyproject.toml"
              - ".github/workflows/security.yml"

      - name: Gitleaks scan
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip (no relevant paths changed)
        if: steps.filter.outputs.security != 'true' && github.event_name != 'schedule'
        run: echo "Skipped — no relevant paths changed"
