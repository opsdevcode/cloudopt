# Runs on every PR; jobs run only when path filter matches, else report success (skip) so status is not pending.
name: Security

on:
  pull_request:
    branches:
      - main
  schedule:
    # Weekly scan: Monday 08:00 UTC
    - cron: "0 8 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            security:
              - "apps/**"
              - "packages/**"
              - "alembic/**"
              - "**/*.py"
              - "pyproject.toml"
              - ".github/workflows/security.yml"

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: |
          python -m pip install --upgrade "pip>=26.1"
          pip install -e ".[dev]"

      - name: Install pip-audit
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: pip install pip-audit

      - name: Audit dependencies
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: pip-audit

      - name: Skip (no relevant paths changed)
        if: steps.filter.outputs.security != 'true' && github.event_name != 'schedule'
        run: echo "Skipped — no relevant paths changed"

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            security:
              - "apps/**"
              - "packages/**"
              - "alembic/**"
              - "**/*.py"
              - "pyproject.toml"
              - ".github/workflows/security.yml"

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        with:
          python-version: "3.11"

      - name: Install project + Bandit
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: |
          python -m pip install --upgrade "pip>=26.1"
          pip install -e ".[dev]"

      - name: Bandit (high severity)
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: bandit -r apps packages alembic -c pyproject.toml -ll

      - name: Skip (no relevant paths changed)
        if: steps.filter.outputs.security != 'true' && github.event_name != 'schedule'
        run: echo "Skipped — no relevant paths changed"

  npm-audit:
    name: npm audit (apps/web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        if: hashFiles('apps/web/package.json') != ''
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: npm audit
        if: hashFiles('apps/web/package.json') != ''
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Skip (no package manifest)
        if: hashFiles('apps/web/package.json') == ''
        run: echo "Skipped — apps/web has no package.json yet"

  secrets-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    env:
      # OSS CLI from https://github.com/gitleaks/gitleaks — no org license (unlike gitleaks-action).
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            security:
              - "apps/**"
              - "packages/**"
              - "alembic/**"
              - "**/*.py"
              - "pyproject.toml"
              - ".github/workflows/security.yml"

      - name: Gitleaks secret scan
        if: steps.filter.outputs.security == 'true' || github.event_name == 'schedule'
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/gitleaks-bin"
          chmod +x "${RUNNER_TEMP}/gitleaks-bin/gitleaks"
          "${RUNNER_TEMP}/gitleaks-bin/gitleaks" version
          "${RUNNER_TEMP}/gitleaks-bin/gitleaks" detect --source . --verbose --redact

      - name: Skip (no relevant paths changed)
        if: steps.filter.outputs.security != 'true' && github.event_name != 'schedule'
        run: echo "Skipped — no relevant paths changed"
