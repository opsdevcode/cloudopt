name: Bug report
description: Report a bug or unexpected behavior
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make test`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CloudOpt version or commit
      placeholder: e.g. v0.6.0 or git SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Docker, etc.
