# CloudOpt local development stack

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cloudopt
      POSTGRES_PASSWORD: cloudopt
      POSTGRES_DB: cloudopt
    ports:
      - "5432:5432"
    volumes:
      - cloudopt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudopt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations before api/worker start so a fresh clone has a usable schema.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - path: .env
        required: false
    environment:
      CLOUDOPT_DATABASE_URL: postgresql+asyncpg://cloudopt:cloudopt@postgres:5432/cloudopt
      CLOUDOPT_DATABASE_URL_SYNC: postgresql://cloudopt:cloudopt@postgres:5432/cloudopt
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      CLOUDOPT_DATABASE_URL: postgresql+asyncpg://cloudopt:cloudopt@postgres:5432/cloudopt
      CLOUDOPT_DATABASE_URL_SYNC: postgresql://cloudopt:cloudopt@postgres:5432/cloudopt
      CLOUDOPT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m apps.worker.main
    env_file:
      - path: .env
        required: false
    environment:
      CLOUDOPT_DATABASE_URL: postgresql+asyncpg://cloudopt:cloudopt@postgres:5432/cloudopt
      CLOUDOPT_DATABASE_URL_SYNC: postgresql://cloudopt:cloudopt@postgres:5432/cloudopt
      CLOUDOPT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js build so server-side rewrites target the API on the Docker network.
        CLOUDOPT_API_ORIGIN: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  cloudopt_pgdata:
